x-laravel-service: &laravel-service
  image: ${IMAGE_NAME:-finance-laravel}:${IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  app:
    <<: *laravel-service
    container_name: finance_laravel_app
    environment:
      REVERB_HOST: reverb
    command: >
      sh -c "cp -an /var/www/html/public/. /srv/public/ &&
      mkdir -p storage/app/public storage/framework/cache/data storage/framework/sessions
      storage/framework/views storage/logs bootstrap/cache &&
      ln -sfn /var/www/html/storage/app/public /srv/public/storage &&
      chown -R www-data:www-data storage bootstrap/cache /srv/public 2>/dev/null || true &&
      php-fpm"
    volumes:
      - storage:/var/www/html/storage
      - public:/srv/public
    networks:
      - default
      - nginxmanager_default
    develop:
      watch:
        - action: sync
          path: ./app
          target: /var/www/html/app
        - action: sync
          path: ./bootstrap
          target: /var/www/html/bootstrap
        - action: sync
          path: ./config
          target: /var/www/html/config
        - action: sync
          path: ./database
          target: /var/www/html/database
        - action: sync
          path: ./public
          target: /srv/public
        - action: sync
          path: ./routes
          target: /var/www/html/routes
        - action: sync
          path: ./artisan
          target: /var/www/html/artisan
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./composer.json
        - action: rebuild
          path: ./composer.lock

  nginx:
    image: nginx:1.27-alpine
    container_name: finance_laravel_nginx
    restart: unless-stopped
    command: >
      /bin/sh -c "printf '%s\n' 'server {' '    listen 80;' '    server_name _;'
      '    root /var/www/html/public;' '    index index.php index.html;' ''
      '    client_max_body_size 50M;' '' '    location / {'
      '        try_files $$uri $$uri/ /index.php?$$query_string;' '    }' ''
      '    location ~ \\.php$$ {' '        fastcgi_pass app:9000;'
      '        fastcgi_index index.php;'
      '        fastcgi_param SCRIPT_FILENAME $$realpath_root$$fastcgi_script_name;'
      '        fastcgi_param DOCUMENT_ROOT $$realpath_root;'
      '        include fastcgi_params;' '    }' ''
      '    location ~ /\\.(?!well-known).* {' '        deny all;' '    }' '}'
      > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      - app
    volumes:
      - public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
    networks:
      - default
      - nginxmanager_default

  queue:
    <<: *laravel-service
    container_name: finance_laravel_queue
    environment:
      REVERB_HOST: reverb
    command: >
      sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions
      storage/framework/views storage/logs bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true &&
      php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    volumes:
      - storage:/var/www/html/storage
    networks:
      - default
      - nginxmanager_default
    develop:
      watch:
        - action: sync
          path: ./app
          target: /var/www/html/app
        - action: sync
          path: ./bootstrap
          target: /var/www/html/bootstrap
        - action: sync
          path: ./config
          target: /var/www/html/config
        - action: sync
          path: ./database
          target: /var/www/html/database
        - action: sync
          path: ./routes
          target: /var/www/html/routes
        - action: sync
          path: ./artisan
          target: /var/www/html/artisan
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./composer.json
        - action: rebuild
          path: ./composer.lock

  reverb:
    <<: *laravel-service
    container_name: finance_laravel_reverb
    command: >
      sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions
      storage/framework/views storage/logs bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true &&
      php artisan reverb:start"
    ports:
      - "${REVERB_SERVER_PORT:-8080}:8080"
    volumes:
      - storage:/var/www/html/storage
    networks:
      - default
      - nginxmanager_default
    develop:
      watch:
        - action: sync
          path: ./app
          target: /var/www/html/app
        - action: sync
          path: ./bootstrap
          target: /var/www/html/bootstrap
        - action: sync
          path: ./config
          target: /var/www/html/config
        - action: sync
          path: ./database
          target: /var/www/html/database
        - action: sync
          path: ./routes
          target: /var/www/html/routes
        - action: sync
          path: ./artisan
          target: /var/www/html/artisan
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./composer.json
        - action: rebuild
          path: ./composer.lock

volumes:
  public:
  storage:

networks:
  nginxmanager_default:
    external: true
