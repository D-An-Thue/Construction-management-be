services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_laravel_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8000
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions
      storage/framework/views storage/logs bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true &&
      php-fpm"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor

  nginx:
    image: nginx:1.27-alpine
    container_name: finance_laravel_nginx
    restart: unless-stopped
    command: >
      /bin/sh -c "printf '%s\n' 'server {' '    listen 80;' '    server_name _;'
      '    root /var/www/html/public;' '    index index.php index.html;' ''
      '    client_max_body_size 50M;' '' '    location / {'
      '        try_files $$uri $$uri/ /index.php?$$query_string;' '    }' ''
      '    location ~ \\.php$$ {' '        fastcgi_pass app:9000;'
      '        fastcgi_index index.php;'
      '        fastcgi_param SCRIPT_FILENAME $$realpath_root$$fastcgi_script_name;'
      '        fastcgi_param DOCUMENT_ROOT $$realpath_root;'
      '        include fastcgi_params;' '    }' ''
      '    location ~ /\\.(?!well-known).* {' '        deny all;' '    }' '}'
      > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_laravel_queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions
      storage/framework/views storage/logs bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true &&
      php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    profiles:
      - worker

  vite:
    image: node:22-alpine
    container_name: finance_laravel_vite
    working_dir: /var/www/html
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    profiles:
      - frontend

volumes:
  vendor:
  node_modules:
