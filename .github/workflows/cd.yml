name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push image
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_tag: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production stack
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.build-and-push.result == 'success') }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ needs.build-and-push.outputs.image_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ needs.build-and-push.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure deployment directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          script: mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export IMAGE_NAME="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
            export IMAGE_TAG="${{ steps.image.outputs.tag }}"
            export APP_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"
            docker compose down --remove-orphans || true
            docker rm -f finance_laravel_app finance_laravel_queue finance_laravel_reverb finance_laravel_nginx 2>/dev/null || true
            for attempt in 1 2 3; do
              if docker pull "$APP_IMAGE" && docker pull nginx:1.27-alpine; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 15
            done
            docker compose up -d --no-build
            docker compose exec -T app php artisan migrate --force
            if [ -n "${{ secrets.APP_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.APP_HEALTHCHECK_URL }}" >/dev/null
            fi
