name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Publish Docker image
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy production stack
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment image
        id: image
        run: |
          echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure deployment directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export IMAGE_NAME="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
            export IMAGE_TAG="${{ steps.image.outputs.tag }}"
            docker compose pull
            docker compose up -d --no-build --remove-orphans
            docker compose exec -T app php artisan migrate --force
            if [ -n "${{ secrets.APP_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.APP_HEALTHCHECK_URL }}" >/dev/null
            fi
